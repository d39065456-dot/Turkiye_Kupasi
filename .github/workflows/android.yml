name: Kivy Android APK'sını oluşturun

on:
  push:
    branches:
      - main
      - ana
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build APK using Buildozer Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/home/buildozer/src \
            kivy/buildozer \
            android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Turkiye-Kupasi-APK
          path: bin/*.apk

          
